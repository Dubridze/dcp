version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proptech
      POSTGRES_PASSWORD: proptech
      POSTGRES_DB: proptech
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptech"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://proptech:proptech@db:5432/proptech
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: proptech
      KEYCLOAK_CLIENT_ID: portal-backend
      SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
